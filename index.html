<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KELOMPOK 2 // CHARACTER SELECT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#04050a;
    --bg-1:#0a0e1c;
    --cyan:#00f0ff;
    --magenta:#ff2e9a;
    --violet:#8b5cf6;
    --amber:#ffcc33;
    --ink:#dbf3ff;
    --ink-dim:#7d92a8;
    --grid-line:rgba(0,240,255,0.12);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    height:100%;
    background:var(--bg-0);
    color:var(--ink);
    font-family:'Rajdhani',sans-serif;
    overflow-x:hidden;
    cursor:none;
  }

  /* ---------- CURSOR ---------- */
  #cursor-dot, #cursor-ring{
    position:fixed;top:0;left:0;
    pointer-events:none;
    z-index:9999;
    transform:translate(-50%,-50%);
  }
  #cursor-dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 8px var(--cyan), 0 0 16px var(--cyan);
  }
  #cursor-ring{
    width:32px;height:32px;border-radius:50%;
    border:1px solid rgba(0,240,255,0.6);
    transition:width .15s, height .15s, border-color .15s, background .15s;
  }
  .cursor-hover #cursor-ring{
    width:56px;height:56px;
    border-color:var(--magenta);
    background:rgba(255,46,154,0.08);
  }

  /* ---------- BACKGROUND LAYERS ---------- */
  #particles{
    position:fixed;inset:0;
    z-index:0;
  }

  .bg-glow{
    position:fixed;inset:0;
    z-index:1;
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, rgba(139,92,246,0.20), transparent 60%),
      radial-gradient(ellipse 50% 40% at 85% 15%, rgba(0,240,255,0.16), transparent 60%),
      radial-gradient(ellipse 60% 50% at 50% 100%, rgba(255,46,154,0.14), transparent 60%);
    pointer-events:none;
  }

  .spotlight{
    position:fixed;inset:0;
    z-index:2;
    pointer-events:none;
    background:radial-gradient(circle 260px at var(--mx,50%) var(--my,50%), rgba(0,240,255,0.06), transparent 70%);
  }

  .grid-floor{
    position:fixed;
    left:0;right:0;bottom:0;
    height:45vh;
    z-index:1;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size:48px 48px;
    transform:perspective(320px) rotateX(72deg);
    transform-origin:bottom;
    mask-image:linear-gradient(to top, black 0%, transparent 85%);
    -webkit-mask-image:linear-gradient(to top, black 0%, transparent 85%);
    animation:gridmove 6s linear infinite;
    opacity:.7;
  }
  @keyframes gridmove{
    from{background-position-y:0;}
    to{background-position-y:48px;}
  }

  .scanlines{
    position:fixed;inset:0;
    z-index:5;
    pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 1px,
      transparent 2px,
      transparent 3px
    );
    mix-blend-mode:overlay;
  }

  .noise-sweep{
    position:fixed;inset:0;
    z-index:6;
    pointer-events:none;
    background:linear-gradient(180deg, transparent 0%, rgba(0,240,255,0.06) 50%, transparent 100%);
    height:140px;
    animation:sweep 5s linear infinite;
  }
  @keyframes sweep{
    0%{transform:translateY(-160px);}
    100%{transform:translateY(100vh);}
  }

  .vignette{
    position:fixed;inset:0;
    z-index:7;
    pointer-events:none;
    box-shadow:inset 0 0 180px 40px rgba(0,0,0,0.75);
  }

  /* ---------- HUD FRAME ---------- */
  .hud-corner{
    position:fixed;
    width:46px;height:46px;
    border:2px solid var(--cyan);
    opacity:.7;
    z-index:8;
    pointer-events:none;
    filter:drop-shadow(0 0 6px rgba(0,240,255,.6));
  }
  .hud-corner.tl{top:18px;left:18px;border-right:none;border-bottom:none;}
  .hud-corner.tr{top:18px;right:18px;border-left:none;border-bottom:none;}
  .hud-corner.bl{bottom:18px;left:18px;border-right:none;border-top:none;}
  .hud-corner.br{bottom:18px;right:18px;border-left:none;border-top:none;}

  .hud-tag{
    position:fixed;
    z-index:8;
    font-family:'Share Tech Mono',monospace;
    font-size:11px;
    letter-spacing:2px;
    color:var(--ink-dim);
    pointer-events:none;
  }
  .hud-tag.top-left{top:22px;left:74px;}
  .hud-tag.top-right{top:22px;right:74px;text-align:right;}
  .hud-tag .live{color:var(--magenta);}
  .hud-tag .live::before{
    content:"";
    display:inline-block;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--magenta);
    margin-right:6px;
    box-shadow:0 0 6px var(--magenta);
    animation:blink 1.4s ease-in-out infinite;
  }
  @keyframes blink{50%{opacity:.2;}}

  /* ---------- LAYOUT ---------- */
  main{
    position:relative;
    z-index:3;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:110px 24px 70px;
  }

  .eyebrow{
    font-family:'Share Tech Mono',monospace;
    font-size:12px;
    letter-spacing:6px;
    color:var(--cyan);
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:18px;
    opacity:0;
    animation:riseIn .7s ease forwards .1s;
  }
  .eyebrow::before, .eyebrow::after{
    content:"";
    width:34px;height:1px;
    background:linear-gradient(90deg, transparent, var(--cyan));
  }
  .eyebrow::after{background:linear-gradient(90deg, var(--cyan), transparent);}

  h1.title{
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:clamp(2.6rem, 8vw, 6rem);
    letter-spacing:4px;
    text-align:center;
    line-height:1;
    text-transform:uppercase;
    color:#f4feff;
    position:relative;
    text-shadow:
      0 0 10px rgba(0,240,255,.55),
      0 0 40px rgba(0,240,255,.25);
    opacity:0;
    animation:riseIn .8s ease forwards .25s;
  }
  h1.title .glitch-layer{
    position:absolute;inset:0;
    color:var(--magenta);
    clip-path:inset(0 0 92% 0);
    animation:glitchTop 4.5s infinite steps(1);
    text-shadow:none;
  }
  h1.title .glitch-layer2{
    position:absolute;inset:0;
    color:var(--cyan);
    clip-path:inset(70% 0 0 0);
    animation:glitchBot 4.5s infinite steps(1);
    text-shadow:none;
  }
  @keyframes glitchTop{
    0%,88%,100%{transform:translate(0,0); clip-path:inset(0 0 92% 0); opacity:0;}
    89%{transform:translate(-4px,-1px); clip-path:inset(10% 0 70% 0); opacity:1;}
    91%{transform:translate(4px,1px); clip-path:inset(0 0 85% 0); opacity:1;}
    93%{opacity:0;}
  }
  @keyframes glitchBot{
    0%,88%,100%{transform:translate(0,0); clip-path:inset(70% 0 0 0); opacity:0;}
    89%{transform:translate(4px,1px); clip-path:inset(60% 0 5% 0); opacity:1;}
    91%{transform:translate(-4px,-1px); clip-path:inset(75% 0 0 0); opacity:1;}
    93%{opacity:0;}
  }

  .subtitle{
    margin-top:22px;
    font-family:'Share Tech Mono',monospace;
    font-size:15px;
    letter-spacing:3px;
    color:var(--ink-dim);
    text-align:center;
    min-height:20px;
    opacity:0;
    animation:riseIn .8s ease forwards .4s;
  }
  .subtitle .caret{
    display:inline-block;
    width:9px;height:15px;
    background:var(--cyan);
    margin-left:4px;
    vertical-align:middle;
    animation:blink .9s steps(1) infinite;
  }

  @keyframes riseIn{
    from{opacity:0; transform:translateY(18px);}
    to{opacity:1; transform:translateY(0);}
  }

  .stats-bar{
    display:flex;
    gap:28px;
    margin-top:38px;
    flex-wrap:wrap;
    justify-content:center;
    opacity:0;
    animation:riseIn .8s ease forwards .55s;
  }
  .stats-bar div{
    font-family:'Share Tech Mono',monospace;
    font-size:12px;
    letter-spacing:2px;
    color:var(--ink-dim);
    border:1px solid rgba(0,240,255,.25);
    padding:8px 16px;
    border-radius:2px;
    background:rgba(0,240,255,0.04);
  }
  .stats-bar span{color:var(--cyan); font-weight:700;}

  /* ---------- ROSTER GRID ---------- */
  .roster{
    margin-top:60px;
    width:100%;
    max-width:1160px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(230px, 1fr));
    gap:26px;
  }

  .card{
    position:relative;
    display:block;
    text-decoration:none;
    color:inherit;
    border-radius:10px;
    padding:2px;
    background:linear-gradient(150deg, rgba(0,240,255,.35), rgba(139,92,246,.15) 40%, rgba(255,46,154,.35));
    opacity:0;
    transform:translateY(24px);
    animation:cardIn .6s ease forwards;
    isolation:isolate;
  }
  .card:nth-child(1){animation-delay:.15s;}
  .card:nth-child(2){animation-delay:.25s;}
  .card:nth-child(3){animation-delay:.35s;}
  .card:nth-child(4){animation-delay:.45s;}
  .card:nth-child(5){animation-delay:.55s;}
  .card:nth-child(6){animation-delay:.65s;}
  @keyframes cardIn{
    to{opacity:1; transform:translateY(0);}
  }

  .card-inner{
    position:relative;
    background:linear-gradient(160deg, #0b0f1e 0%, #0a0c17 100%);
    border-radius:9px;
    padding:26px 20px 22px;
    height:100%;
    overflow:hidden;
    transition:transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s ease;
  }

  .card::after{
    content:"";
    position:absolute;inset:0;
    border-radius:10px;
    padding:2px;
    background:linear-gradient(150deg, var(--cyan), var(--violet) 40%, var(--magenta));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    opacity:0;
    transition:opacity .35s ease;
    pointer-events:none;
  }
  .card:hover::after{opacity:1;}
  .card:hover .card-inner{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 18px 40px -12px rgba(0,240,255,.35);
  }

  .card-inner::before{
    content:"";
    position:absolute;
    top:-60%;left:-60%;
    width:220%;height:220%;
    background:conic-gradient(from 0deg, transparent 0deg, rgba(0,240,255,.12) 40deg, transparent 80deg);
    opacity:0;
    transition:opacity .3s;
    animation:spin 3.5s linear infinite;
    pointer-events:none;
  }
  .card:hover .card-inner::before{opacity:1;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .card-id{
    font-family:'Share Tech Mono',monospace;
    font-size:11px;
    letter-spacing:2px;
    color:var(--ink-dim);
    display:flex;
    justify-content:space-between;
    margin-bottom:16px;
    position:relative;
    z-index:2;
  }
  .card-id .status{color:var(--amber);}

  .avatar-ring{
    width:78px;height:78px;
    margin:0 auto 16px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',sans-serif;
    font-size:26px;
    font-weight:700;
    color:#04050a;
    background:conic-gradient(var(--cyan), var(--violet), var(--magenta), var(--cyan));
    position:relative;
    z-index:2;
    box-shadow:0 0 22px rgba(0,240,255,.35);
  }
  .avatar-ring::before{
    content:"";
    position:absolute;
    inset:4px;
    border-radius:50%;
    background:#0a0c17;
  }
  .avatar-ring span{position:relative; z-index:1; color:var(--ink);}

  .card-name{
    font-family:'Orbitron',sans-serif;
    font-size:19px;
    font-weight:700;
    text-align:center;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#f4feff;
    position:relative;
    z-index:2;
    margin-bottom:6px;
  }

  .card-role{
    text-align:center;
    font-size:13px;
    letter-spacing:1.5px;
    color:var(--ink-dim);
    position:relative;
    z-index:2;
    margin-bottom:18px;
  }

  .card-bars{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    gap:7px;
    margin-bottom:18px;
  }
  .bar-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'Share Tech Mono',monospace;
    font-size:10px;
    color:var(--ink-dim);
  }
  .bar-row .label{width:26px;}
  .bar-track{
    flex:1;
    height:5px;
    background:rgba(255,255,255,0.06);
    border-radius:3px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius:3px;
    background:linear-gradient(90deg, var(--cyan), var(--violet));
    transform:scaleX(0);
    transform-origin:left;
    animation:fillBar 1.1s ease forwards;
  }

  @keyframes fillBar{to{transform:scaleX(1);}}

  .card-cta{
    position:relative;
    z-index:2;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    letter-spacing:2px;
    font-size:13px;
    text-transform:uppercase;
    color:var(--cyan);
    padding:10px;
    border:1px solid rgba(0,240,255,.35);
    border-radius:4px;
    transition:background .25s, color .25s, border-color .25s;
  }
  .card:hover .card-cta{
    background:var(--cyan);
    color:#04050a;
    border-color:var(--cyan);
  }
  .card-cta .arrow{transition:transform .25s;}
  .card:hover .card-cta .arrow{transform:translateX(4px);}

  /* ---------- FOOTER ---------- */
  footer{
    position:relative;
    z-index:3;
    margin-top:70px;
    font-family:'Share Tech Mono',monospace;
    font-size:11px;
    letter-spacing:2px;
    color:var(--ink-dim);
    text-align:center;
    opacity:0;
    animation:riseIn .8s ease forwards .8s;
  }
  footer span{color:var(--magenta);}

  @media (max-width:640px){
    .hud-tag{display:none;}
    html,body{cursor:auto;}
    #cursor-dot,#cursor-ring{display:none;}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<div class="spotlight" id="spotlight"></div>
<div class="grid-floor"></div>
<div class="scanlines"></div>
<div class="noise-sweep"></div>
<div class="vignette"></div>

<div class="hud-corner tl"></div>
<div class="hud-corner tr"></div>
<div class="hud-corner bl"></div>
<div class="hud-corner br"></div>
<div class="hud-tag top-left">SYS // KELOMPOK-2<br><span class="live">LIVE</span></div>
<div class="hud-tag top-right" id="clock">--:--:--<br>NODE // AKTIF</div>

<div id="cursor-ring"></div>
<div id="cursor-dot"></div>

<main>
  <div class="eyebrow">ROSTER SELECT</div>
  <h1 class="title" data-text="KELOMPOK 2">
    KELOMPOK 2
    <span class="glitch-layer" aria-hidden="true">KELOMPOK 2</span>
    <span class="glitch-layer2" aria-hidden="true">KELOMPOK 2</span>
  </h1>
  <div class="subtitle" id="typewriter"></div>

  <div class="stats-bar">
    <div>ANGGOTA <span>06</span></div>
    <div>STATUS <span>ONLINE</span></div>
    <div>MODE <span>PROFIL</span></div>
  </div>

  <section class="roster" id="roster"></section>

  <footer>
    KELOMPOK 2 <span>//</span> PILIH SATU KARTU UNTUK MEMBUKA PROFIL
  </footer>
</main>

<script>
  // ---------- DATA ANGGOTA ----------
  const members = [
    { name:"Sava",     role:"Front-end Specialist", href:"sava.html",     init:"SV" },
    { name:"Dinda",    role:"Design Lead",           href:"dinda.html",    init:"DN" },
    { name:"Grycelda", role:"Content Strategist",    href:"grycelda.html", init:"GR" },
    { name:"Najla",    role:"Research Analyst",      href:"najla.html",    init:"NJ" },
    { name:"Sasa",     role:"Project Coordinator",   href:"sasa.html",     init:"SS" },
    { name:"Vio",      role:"QA & Documentation",    href:"vio.html",      init:"VI" },
  ];

  const roster = document.getElementById('roster');
  members.forEach((m, i) => {
    const stat1 = 60 + Math.floor(Math.random()*35);
    const stat2 = 55 + Math.floor(Math.random()*40);
    const card = document.createElement('a');
    card.className = 'card';
    card.href = m.href;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-id">
          <span>ID_0${i+1}</span>
          <span class="status">● READY</span>
        </div>
        <div class="avatar-ring"><span>${m.init}</span></div>
        <div class="card-name">${m.name}</div>
        <div class="card-role">${m.role}</div>
        <div class="card-bars">
          <div class="bar-row"><span class="label">PWR</span><div class="bar-track"><div class="bar-fill" style="width:${stat1}%"></div></div></div>
          <div class="bar-row"><span class="label">SYN</span><div class="bar-track"><div class="bar-fill" style="width:${stat2}%; animation-delay:.15s;"></div></div></div>
        </div>
        <div class="card-cta">Buka Profil <span class="arrow">›</span></div>
      </div>
    `;
    roster.appendChild(card);
  });

  // ---------- CURSOR ----------
  const dot = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  const spotlight = document.getElementById('spotlight');
  let mx = window.innerWidth/2, my = window.innerHeight/2;
  let rx = mx, ry = my;

  window.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px';
    dot.style.top = my + 'px';
    spotlight.style.setProperty('--mx', mx + 'px');
    spotlight.style.setProperty('--my', my + 'px');
  });

  function animateRing(){
    rx += (mx - rx) * 0.15;
    ry += (my - ry) * 0.15;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();

  document.querySelectorAll('a, .card').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
  });

  // ---------- TYPEWRITER ----------
  const phrases = [
    "PILIH ANGGOTA UNTUK MELIHAT PROFIL LENGKAP",
    "SISTEM SIAP // KLIK KARTU UNTUK MELANJUTKAN",
    "6 UNIT TERDETEKSI // SEMUA STATUS: ONLINE"
  ];
  const tw = document.getElementById('typewriter');
  let pIndex = 0, cIndex = 0, deleting = false;

  function typeLoop(){
    const current = phrases[pIndex];
    if(!deleting){
      cIndex++;
      tw.innerHTML = current.slice(0, cIndex) + '<span class="caret"></span>';
      if(cIndex === current.length){
        deleting = true;
        setTimeout(typeLoop, 1600);
        return;
      }
    } else {
      cIndex--;
      tw.innerHTML = current.slice(0, cIndex) + '<span class="caret"></span>';
      if(cIndex === 0){
        deleting = false;
        pIndex = (pIndex + 1) % phrases.length;
      }
    }
    setTimeout(typeLoop, deleting ? 25 : 45);
  }
  typeLoop();

  // ---------- CLOCK ----------
  function tickClock(){
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    document.getElementById('clock').innerHTML = `${hh}:${mm}:${ss}<br>NODE // AKTIF`;
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ---------- PARTICLES ----------
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, particles;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const colors = ['#00f0ff', '#ff2e9a', '#8b5cf6'];
  function makeParticles(){
    const count = Math.min(90, Math.floor(W/16));
    particles = Array.from({length: count}, () => ({
      x: Math.random()*W,
      y: Math.random()*H,
      r: Math.random()*1.6 + 0.4,
      vx: (Math.random()-0.5)*0.25,
      vy: (Math.random()-0.5)*0.25,
      c: colors[Math.floor(Math.random()*colors.length)],
      a: Math.random()*0.6 + 0.2
    }));
  }
  makeParticles();
  window.addEventListener('resize', makeParticles);

  function drawParticles(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x < 0) p.x = W; if(p.x > W) p.x = 0;
      if(p.y < 0) p.y = H; if(p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.c;
      ctx.globalAlpha = p.a;
      ctx.shadowBlur = 6;
      ctx.shadowColor = p.c;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(drawParticles);
  }
  drawParticles();
</script>
