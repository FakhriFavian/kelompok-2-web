<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#7c3aed,#ec4899);
}

.container{
    width:90%;
    max-width:550px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:25px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

h1{
    color:white;
    font-size:38px;
    margin-bottom:8px;
}

.subtitle{
    color:#f1f5f9;
    margin-bottom:30px;
    font-size:16px;
}

.list{
    display:grid;
    gap:15px;
}

.list a{
    display:block;
    text-decoration:none;
    background:white;
    color:#4f46e5;
    padding:16px;
    border-radius:15px;
    font-size:18px;
    font-weight:600;
    transition:.25s;
}

.list a:hover{
    transform:translateY(-5px) scale(1.03);
    background:#4f46e5;
    color:white;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.footer{
    margin-top:30px;
    color:white;
    font-size:13px;
    opacity:.8;
}
</style>

</head>
